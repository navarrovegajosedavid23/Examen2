<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Historial de Facturas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.11.5/css/dataTables.bootstrap4.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <style>
        .brand-link { border-bottom: 1px solid #4b545c !important; padding: 15px 0 !important; }
        .user-panel-simple { padding: 25px 15px; color: #c2c7d0; font-size: 1.1rem; border-bottom: 1px solid #4b545c; margin-bottom: 15px; text-align: center; }
        .user-panel-simple i { display: block; font-size: 2.5rem; margin-bottom: 10px; color: #fff; }
    </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a></li>
        </ul>
    </nav>

    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a th:href="@{/home/MostrarInicio}" class="brand-link text-center">
            <span class="brand-text font-weight-bold">SISTEMA CLÍNICO</span>
        </a>
        <div class="sidebar">
            <div class="user-panel-simple">
                <i class="fas fa-user-circle"></i>
                <span sec:authentication="name">david@gmail.com</span>
            </div>

            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
                    <li class="nav-item">
                        <a th:href="@{/home/MostrarInicio}" class="nav-link">
                            <i class="nav-icon fas fa-chart-pie"></i>
                            <p>Dashboard</p>
                        </a>
                    </li>
                    <li class="nav-item menu-open">
                        <a href="#" class="nav-link active">
                            <i class="nav-icon fas fa-calendar-alt"></i>
                            <p> Gestión <i class="right fas fa-angle-left"></i> </p>
                        </a>
                        <ul class="nav nav-treeview">
                            <li class="nav-item"><a th:href="@{/citas}" class="nav-link"><i class="fas fa-eye nav-icon"></i><p>Ver Citas</p></a></li>
                            <li class="nav-item"><a th:href="@{/productos}" class="nav-link"><i class="fas fa-box nav-icon"></i><p>Ver Productos</p></a></li>
                            <li class="nav-item"><a th:href="@{/facturas}" class="nav-link active"><i class="fas fa-file-invoice-dollar nav-icon"></i><p>Ver Facturas</p></a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6"><h1>Historial de Facturas</h1></div>
                    <div class="col-sm-6 text-right">
                        <a th:href="@{/facturas/nueva}" class="btn btn-primary"><i class="fas fa-plus"></i> Nueva Factura</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <div class="card card-outline card-primary">
                    <div class="card-body">
                        <table id="tablaFacturas" class="table table-bordered table-striped">
                            <thead>
                            <tr>
                                <th>ID</th>
                                <th>Cliente</th>
                                <th>Razón Social</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th class="text-center">Opciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="f : ${facturas}">
                                <td th:text="${f.idFactura}"></td>
                                <td th:text="${f.Cliente}" class="font-weight-bold"></td>
                                <td th:text="${f.razonSocial}"></td>
                                <td th:text="${f.fecha}"></td>
                                <td th:text="'$' + ${f.Total}"></td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a th:href="@{/facturas/mostrar/{id}(id=${f.idFactura})}" class="btn btn-info btn-sm"><i class="fas fa-file-invoice"></i></a>
                                        <a th:href="@{/facturas/editar/{id}(id=${f.idFactura})}" class="btn btn-warning btn-sm"><i class="fas fa-edit"></i></a>
                                        <a th:href="@{/facturas/eliminar/{id}(id=${f.idFactura})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Borrar?')"><i class="fas fa-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.11.5/js/dataTables.bootstrap4.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
<script>
    $(function () {
        $("#tablaFacturas").DataTable({
            "responsive": true, "lengthChange": false, "autoWidth": false,
            "language": { "search": "Buscar:", "paginate": { "next": "Sig.", "previous": "Ant." } }
        });
    });
</script>
</body>
</html>
