<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Clínica | Editar Producto</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="card card-outline card-info">
        <div class="card-header text-center">
            <a href="#" class="h1"><b>Editar</b> Producto</a>
        </div>
        <div class="card-body">
            <form th:action="@{/productos/actualizar/{id}(id=${producto.idProducto})}" th:object="${producto}" method="post">

                <div class="form-group">
                    <label>ID Producto</label>
                    <input type="text" class="form-control" th:field="*{idProducto}" readonly>
                </div>

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" class="form-control" th:field="*{nombre}" required>
                </div>

                <div class="form-group">
                    <label>Marca</label>
                    <input type="text" class="form-control" th:field="*{marca}" required>
                </div>

                <div class="form-group">
                    <label>Precio</label>
                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                </div>

                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" class="form-control" th:field="*{stock}" required>
                </div>

                <button type="submit" class="btn btn-info btn-block">Actualizar Inventario</button>
            </form>
            <p class="mt-3 text-center"><a th:href="@{/productos}">Cancelar</a></p>
        </div>
    </div>
</div>
</body>
</html>
