<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nuevo Producto</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box" style="width: 450px;">
    <div class="card card-outline card-primary shadow-lg">
        <div class="card-header text-center">
            <a href="#" class="h1"><b>Nuevo</b> Producto</a>
        </div>
        <div class="card-body">
            <p class="login-box-msg">Ingresa los detalles del inventario</p>

            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">

                <div class="input-group mb-3">
                    <input type="text" class="form-control" th:field="*{nombre}" placeholder="Nombre del producto" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-box"></span>
                        </div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="text" class="form-control" th:field="*{marca}" placeholder="" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-copyright"></span>
                        </div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="number" step="0.01" class="form-control" th:field="*{precio}" placeholder="Precio unitario" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-dollar-sign"></span>
                        </div>
                    </div>
                </div>

                <div class="input-group mb-3">
                    <input type="number" class="form-control" th:field="*{stock}" placeholder="Cantidad en stock" required>
                    <div class="input-group-append">
                        <div class="input-group-text">
                            <span class="fas fa-cubes"></span>
                        </div>
                    </div>
                </div>

                <div class="row mt-4">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block">
                            <i class="fas fa-save mr-2"></i> Guardar en Inventario
                        </button>
                    </div>
                </div>
            </form>

            <p class="mt-3 mb-1 text-center">
                <a th:href="@{/productos}" class="text-secondary">
                    <i class="fas fa-arrow-left mr-1"></i> Cancelar y regresar
                </a>
            </p>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
