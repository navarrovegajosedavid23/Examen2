<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Factura</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">
    <div class="content-wrapper ml-0">
        <section class="content">
            <div class="container-fluid">
                <div class="invoice p-3 mb-3 mt-3 shadow-sm">
                    <form th:action="@{/facturas/actualizar/{id}(id=${factura.idFactura})}" th:object="${factura}" method="post">

                        <input type="hidden" th:field="*{idFactura}">
                        <input type="hidden" th:field="*{cita}">

                        <div class="row">
                            <div class="col-12">
                                <h4>
                                    <i class="fas fa-globe"></i> CLÍNICA DAVID, Inc.
                                    <small class="float-right">Fecha:
                                        <input type="date" th:field="*{fecha}" class="form-control d-inline-block w-auto" required>
                                    </small>
                                </h4>
                            </div>
                        </div>

                        <div class="row invoice-info mt-4">
                            <div class="col-sm-4 invoice-col">
                                De: <strong>Admin, Inc.</strong><br>Calera, Zacatecas<br>david@clinica.com
                            </div>
                            <div class="col-sm-4 invoice-col">
                                Cliente a Corregir:
                                <input type="text" th:field="*{Cliente}" class="form-control mb-2" placeholder="Nombre" required>
                                <input type="text" th:field="*{razonSocial}" class="form-control" placeholder="RFC">
                            </div>
                            <div class="col-sm-4 invoice-col">
                                <b>Folio:</b> <span th:text="*{idFactura}"></span><br>
                                <br>
                                <b>Estado:</b> <span class="badge badge-warning">Modificando</span>
                            </div>
                        </div>

                        <div class="row mt-4">
                            <div class="col-12 table-responsive">
                                <table class="table table-striped">
                                    <thead>
                                    <tr>
                                        <th style="width: 10%">Cant</th>
                                        <th style="width: 30%">Producto/Servicio</th>
                                        <th style="width: 40%">Descripción</th>
                                        <th style="width: 20%">Subtotal</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr>
                                        <td><input type="number" class="form-control" th:field="*{cantidad}"></td>
                                        <td><input type="text" class="form-control" th:field="*{producto}" placeholder="Ej. Servicio Médico"></td>
                                        <td><input type="text" class="form-control" th:field="*{descripcion}" placeholder="Detalles extra..."></td>
                                        <td>
                                            <div class="input-group">
                                                <div class="input-group-prepend"><span class="input-group-text">$</span></div>
                                                <input type="number" step="0.01" th:field="*{Total}" class="form-control" required>
                                            </div>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="row no-print mt-4">
                            <div class="col-12 text-right">
                                <a th:href="@{/facturas}" class="btn btn-secondary float-left">
                                    <i class="fas fa-arrow-left"></i> Regresar
                                </a>
                                <button type="button" class="btn btn-primary mr-2" onclick="window.print();">
                                    <i class="fas fa-print"></i> Imprimir
                                </button>
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-sync-alt"></i> Actualizar Factura
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
</body>
</html>
