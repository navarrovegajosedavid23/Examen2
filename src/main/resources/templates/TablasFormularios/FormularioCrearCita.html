<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clínica | Nueva Cita</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box" style="width: 400px;">
    <div class="card card-outline card-primary">
        <div class="card-header text-center">
            <a href="#" class="h1"><b>Nueva</b> Cita</a>
        </div>
        <div class="card-body">
            <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">
                <div class="input-group mb-3">
                    <input type="text" class="form-control" th:field="*{paciente}" placeholder="Nombre del Paciente" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-user"></span></div></div>
                </div>
                <div class="input-group mb-3">
                    <input type="text" class="form-control" th:field="*{tratamiento}" placeholder="Tratamiento (ej. Hidrafacial)" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-magic"></span></div></div>
                </div>
                <div class="input-group mb-3">
                    <input type="date" class="form-control" th:field="*{fecha}" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-calendar"></span></div></div>
                </div>
                <div class="input-group mb-3">
                    <input type="time" class="form-control" th:field="*{hora}" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-clock"></span></div></div>
                </div>
                <div class="input-group mb-3">
                    <input type="number" step="0.01" class="form-control" th:field="*{costo}" placeholder="Costo del servicio" required>
                    <div class="input-group-append"><div class="input-group-text"><span class="fas fa-dollar-sign"></span></div></div>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-block">Agendar Cita</button>
                    </div>
                </div>
            </form>
            <p class="mt-3 mb-1 text-center"><a th:href="@{/citas}">Regresar al listado</a></p>
        </div>
    </div>
</div>
</body>
</html>
