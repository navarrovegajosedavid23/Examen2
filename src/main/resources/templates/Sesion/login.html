<!DOCTYPE html>
<html lang="es" xmlns:th = "http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Papeleria | Inicio de sesion</title>

  <!-- Google Font: Source Sans Pro -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="../../plugins/fontawesome-free/css/all.min.css">
  <!-- icheck bootstrap -->
  <link rel="stylesheet" href="../../plugins/icheck-bootstrap/icheck-bootstrap.min.css">
  <!-- Theme style -->
  <link rel="stylesheet" href="../../dist/css/adminlte.min.css">
</head>
<body class="hold-transition login-page">
<div class="login-box">
  <div class="login-logo">
    <a href="../../index2.html">Papeleria</a>
  </div>
  <!-- /.login-logo -->
  <div class="card">
    <div class="card-body login-card-body">
      <p class="login-box-msg">Inicio de sesión</p>

      <form th:action="@{/auth/MostrarInicioSesion}" method="post">
        <div class="input-group mb-3">
          <input type="email" name = "username" class="form-control" placeholder="Email" autocomplete = "one-time-code">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-envelope"></span>
            </div>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="password" name = "password" class="form-control" placeholder="Contraseña" autocomplete = "new-password">
          <div class="input-group-append">
            <div class="input-group-text">
              <span class="fas fa-lock"></span>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-4">
            <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
          </div>

        </div>

        <p class="mb-1">
          <button type = "button" onclick = "enviarCorreo()" class="btn btn-link p-0 m-0"  style="vertical-align: baseline;">Olvidé mi contraseña</button>
        </p>
      </form>
      <p class="mb-0">
        <a th:href="@{/auth/MostrarRegistrarUsuario}" class="text-center">Registrar a un nuevo usuario</a>
      </p>
    </div>
    <!-- /.login-card-body -->
  </div>
</div>
<!-- /.login-box -->
<form id = "formRecuperar" th:action="@{/sendEmail/RecuperarContrasenia}" method = "post" style = "display:none;">
  <input type = "hidden" name = "username" id="correoOculto">
</form>

<script>
  function enviarCorreo() {
    const CorreoOriginal = document.getElementsByName('username')[0].value;

  if(!CorreoOriginal)
  {
    alert("Introduce el correo primero");
    return;
  }

  document.getElementById('correoOculto').value = CorreoOriginal;
  document.getElementById('formRecuperar').submit();
  }
</script>
<!-- jQuery -->
<script src="../../plugins/jquery/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="../../plugins/bootstrap/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="../../dist/js/adminlte.min.js"></script>
</body>
</html>
