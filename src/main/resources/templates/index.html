<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clínica Estética</title>

  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

  <style>
    .small-box .icon { font-size: 70px; top: 10px; opacity: 0.2; }
    .brand-link { border-bottom: 1px solid #4b545c !important; padding: 15px 0 !important; }
    .user-panel-simple { padding: 25px 15px; color: #c2c7d0; font-size: 1.1rem; border-bottom: 1px solid #4b545c; margin-bottom: 15px; }
    .nav-pills .nav-link.active { background-color: #007bff !important; color: #fff !important; border-radius: 8px; }
    .nav-sidebar .nav-item { margin-bottom: 5px; padding: 0 10px; }
    .nav-sidebar .nav-link { padding: 12px 15px; font-size: 1.1rem; }
    .nav-sidebar .nav-link i { margin-right: 10px; width: 25px; text-align: center; }
  </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

  <nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
      </li>
    </ul>

    <ul class="navbar-nav ml-auto">
      <li class="nav-item">
        <form th:action="@{/logout}" method="post" id="logoutForm" style="display: none;"></form>
        <a class="nav-link text-danger" href="javascript:void(0)"
           onclick="document.getElementById('logoutForm').submit();"
           title="Cerrar Sesión">
          <i class="fas fa-power-off"></i>
        </a>
      </li>
    </ul>
  </nav>

  <aside class="main-sidebar sidebar-dark-primary elevation-4">
    <a th:href="@{/home/MostrarInicio}" class="brand-link text-center">
      <span class="brand-text font-weight-bold">SISTEMA CLÍNICO</span>
    </a>

    <div class="sidebar">
      <div class="user-panel-simple">
        <i class="fas fa-user-circle"></i>
        <span th:text="${usuarioLogueado}">david@gmail.com</span>
      </div>

      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" role="menu">
          <li class="nav-item">
            <a th:href="@{/home/MostrarInicio}" class="nav-link active">
              <i class="fas fa-chart-pie"></i>
              <p>Dashboard</p>
            </a>
          </li>
          <li class="nav-item">
            <a th:href="@{/citas}" class="nav-link">
              <i class="fas fa-calendar-alt"></i>
              <p>Citas</p>
            </a>
          </li>
          <li class="nav-item">
            <a th:href="@{/productos}" class="nav-link">
              <i class="fas fa-box"></i>
              <p>Productos</p>
            </a>
          </li>
          <li class="nav-item">
            <a th:href="@{/facturas}" class="nav-link">
              <i class="fas fa-file-invoice-dollar nav-icon"></i>
              <p>Ver Facturas</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <div class="content-wrapper">
    <div class="content-header">
      <div class="container-fluid">
        <h1 class="m-0" th:text="'Bienvenido, ' + ${usuarioLogueado}">Bienvenido</h1>
      </div>
    </div>

    <section class="content">
      <div class="container-fluid">
        <div class="row">
          <div class="col-lg-4 col-6">
            <div class="small-box bg-info">
              <div class="inner"><h3 th:text="${totalFacturas}">0</h3><p>Facturas</p></div>
              <div class="icon"><i class="fas fa-file-invoice"></i></div>
              <a th:href="@{/facturas}" class="small-box-footer">Ver más <i class="fas fa-arrow-circle-right"></i></a>
            </div>
          </div>
          <div class="col-lg-4 col-6">
            <div class="small-box bg-success">
              <div class="inner"><h3 th:text="${totalProductos}">0</h3><p>Productos</p></div>
              <div class="icon"><i class="fas fa-box"></i></div>
              <a th:href="@{/productos}" class="small-box-footer">Ver más <i class="fas fa-arrow-circle-right"></i></a>
            </div>
          </div>
          <div class="col-lg-4 col-6">
            <div class="small-box bg-warning">
              <div class="inner"><h3 th:text="${totalCitas}">0</h3><p>Citas</p></div>
              <div class="icon"><i class="fas fa-calendar-check"></i></div>
              <a th:href="@{/citas}" class="small-box-footer">Ver más <i class="fas fa-arrow-circle-right"></i></a>
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col-12">
            <div class="card card-primary card-outline">
              <div class="card-header"><h3 class="card-title">Análisis de Datos</h3></div>
              <div class="card-body">
                <div class="chart">
                  <canvas id="bigBarChart" style="min-height: 350px; height: 350px; max-width: 100%;"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script th:inline="javascript">
  $(function () {
    /* Datos desde Thymeleaf */
    var facturas = [[${totalFacturas != null ? totalFacturas : 0}]];
    var citas = [[${totalCitas != null ? totalCitas : 0}]];
    var productos = [[${totalProductos != null ? totalProductos : 0}]];

    var ctx = $('#bigBarChart').get(0).getContext('2d');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Facturas', 'Productos', 'Citas'], // Orden corregido para coincidir con colores
        datasets: [{
          label: 'Registros',
          /* COLORES CORREGIDOS: Azul (Info), Verde (Success), Amarillo (Warning) */
          backgroundColor: ['#17a2b8', '#28a745', '#ffc107'],
          data: [facturas, productos, citas] // Orden corregido de los datos
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          yAxes: [{
            ticks: {
              beginAtZero: true,
              stepSize: 1
            }
          }]
        }
      }
    });
  });
</script>
</body>
</html>
